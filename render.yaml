# Render Blueprint — Phase 5 (Free-tier variant)
#
# Deploy: push this repo to GitHub, then in the Render dashboard use
# "New +" → "Blueprint" and point it at this repo.
#
# COST NOTE — read before deploying:
# This variant runs on Render's FREE web service plan. Render no longer
# offers a free Postgres tier at all, so there is no Render database
# resource in this file — you must provision Postgres yourself on a free
# external provider (Neon, Supabase, Aiven, etc.) and paste the connection
# string into DATABASE_URL manually (see below).
#
# TRADE-OFF: Render's free web service plan spins the instance down after
# ~15 min of no inbound HTTP traffic, and spin-up on the next request takes
# a beat. Because timeout_worker.py and job_worker.py only run while the
# process is alive, they simply pause while sleeping and resume on the next
# request — reminders/timeouts/queued jobs can be delayed until something
# wakes the service back up. If you need those to fire on time with no
# gaps, you need an always-on paid instance instead, or an external
# cron/uptime pinger hitting /health every few minutes to keep the
# instance awake (note this does eat into Render's free monthly usage
# hours).
#
# What this does NOT set for you (add these as secrets after first deploy,
# via the Render dashboard → this service → Environment):
#   TELEGRAM_BOT_TOKEN   your bot token from @BotFather
#   GROQ_API_KEY         your Groq API key
#   DATABASE_URL         your external Postgres connection string (must
#                        include ?sslmode=require for most free providers —
#                        see database.py, which passes the DSN to asyncpg
#                        as-is)
# PUBLIC_URL is set below using Render's own generated hostname via
# `fromService`, so you don't need to hardcode or update it after deploy.

services:
  - type: web
    name: gitguard
    runtime: python
    plan: free            # Render's free compute tier. Spins down after
                          # ~15 min idle — see the COST NOTE above for what
                          # that means for the background workers.
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn webhook_server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Secrets — set these manually in the Render dashboard after first
      # deploy (sync: false means Render won't ask for/store a default,
      # and won't overwrite whatever you set there on redeploy).
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false

      # Set this manually to your external Postgres connection string
      # (Neon/Supabase/Aiven free tier, etc.) — see COST NOTE above.
      - key: DATABASE_URL
        sync: false

      # Wired automatically — no manual entry needed.
      - key: PUBLIC_URL
        fromService:
          type: web
          name: gitguard
          property: host

      # Sensible production defaults — override in the dashboard if needed.
      - key: LOG_FORMAT
        value: json
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_MAX_TOKENS
        value: "4096"
      - key: GROQ_TEMPERATURE
        value: "0.3"
      - key: ROLLBACK_STRATEGY
        value: revert
      - key: JOB_POLL_INTERVAL_SECONDS
        value: "3"
      - key: JOB_WORKER_COUNT
        value: "3"
      - key: JOB_MAX_ATTEMPTS
        value: "3"
      - key: DB_POOL_MIN
        value: "2"
      - key: DB_POOL_MAX
        value: "10"

      # Admin alerting (Phase 4) — set ADMIN_CHAT_ID manually (your own
      # Telegram chat_id, from /status in the bot) to receive alerts when a
      # failure category repeats past threshold. Left unset by default;
      # GitGuard logs a warning instead of alerting if it's empty.
      - key: ADMIN_CHAT_ID
        sync: false
      - key: ALERT_FAILURE_THRESHOLD
        value: "5"
      - key: ALERT_WINDOW_SECONDS
        value: "600"
      - key: ALERT_COOLDOWN_SECONDS
        value: "1800"
